<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvolvrScreener</title>
    <meta name="manifest.type" content="browser_action">
    <script type="module" crossorigin src="/chunks/popup-CaAJ6ofp.js"></script>
    <link rel="modulepreload" crossorigin href="/chunks/storage-BM-5A9r6.js">
    <link rel="stylesheet" crossorigin href="/assets/popup-tAA7e81s.css">
  </head>
  <body>
    <div id="app">
      <header>
        <div class="header-brand">
          <img src="./evolv-logo.png" alt="evolv" class="header-logo">
          <h1>EvolvrScreener</h1>
        </div>
        <div class="header-actions">
          <div id="lang-toggle-btn" class="lang-flags" role="button" tabindex="0" aria-label="Cambiar idioma">
            <span id="flag-es" class="lang-flag lang-flag--active" title="Español">🇨🇴</span>
            <span id="flag-en" class="lang-flag" title="English">🇺🇸</span>
          </div>
          <a id="settings-link" href="#">Ajustes</a>
        </div>
      </header>

      <section id="evaluate-section">
        <button id="evaluate-btn" type="button">Evaluar</button>
      </section>

      <section id="result-section" hidden>
        <div id="result-error" class="error-message"></div>
        <div class="result-score-row">
          <div id="score-donut" class="score-donut">
            <span id="score-pct-label" class="score-pct-label"></span>
          </div>
          <div class="result-score-info">
            <div id="result-tier"></div>
            <div id="result-experience-level"></div>
          </div>
        </div>
        <div id="result-matched-skills"></div>
        <div id="result-missing-skills"></div>
        <div id="result-rationale"></div>
      </section>

      <section id="red-flags-section" hidden>
        <h2 id="red-flags-title">⚑ Alertas de perfil y preguntas para la entrevista</h2>
        <div id="red-flags-list"></div>
      </section>

      <section id="message-section" hidden>
        <h2 id="contact-message-title">Mensaje de contacto</h2>
        <button id="generate-msg-btn" type="button" disabled>Redactar mensaje</button>
        <textarea id="message-textarea" rows="6" placeholder="El mensaje aparecerá aquí..."></textarea>
        <div id="message-actions">
          <button id="copy-msg-btn" type="button" disabled>Copiar</button>
          <button id="open-linkedin-btn" type="button" disabled>Abrir en LinkedIn</button>
          <button id="mark-sent-btn" type="button" disabled>Marcar como enviado</button>
        </div>
        <div id="message-status"></div>
      </section>

      <section id="export-section">
        <button id="export-csv-btn" type="button">Exportar CSV</button>
        <button id="clear-candidates-btn" type="button">Borrar candidatos</button>
      </section>

      <section id="storage-section">
        <div id="storage-usage">Almacenamiento: cargando...</div>
      </section>

      <section id="overdue-section">
        <h2 id="overdue-title">Seguimientos pendientes</h2>
        <div id="overdue-list">Cargando...</div>
      </section>

      <section id="history-section">
        <h2 id="history-title">Candidatos recientes</h2>
        <div id="candidate-list">Cargando...</div>
      </section>
    </div>
  </body>
</html>
