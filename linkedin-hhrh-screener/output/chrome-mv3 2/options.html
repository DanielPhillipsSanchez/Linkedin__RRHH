<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn HHRH Screener — Settings</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 800px;
        margin: 0 auto;
        padding: 24px;
        color: #1a1a1a;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 32px;
      }
      h2 {
        font-size: 1.15rem;
        margin-bottom: 16px;
      }
      section {
        margin-bottom: 40px;
        padding-bottom: 32px;
        border-bottom: 1px solid #e0e0e0;
      }
      section:last-child {
        border-bottom: none;
      }
      input[type="password"],
      input[type="text"],
      textarea {
        display: block;
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        font-size: 0.95rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        margin-bottom: 8px;
      }
      textarea {
        resize: vertical;
        font-family: inherit;
      }
      button {
        padding: 8px 16px;
        font-size: 0.9rem;
        cursor: pointer;
        border: 1px solid #888;
        border-radius: 4px;
        background: #f5f5f5;
      }
      button:hover {
        background: #e8e8e8;
      }
      #api-key-status {
        display: block;
        margin-top: 8px;
        font-size: 0.9rem;
        color: #555;
      }
      #api-key-indicator {
        margin-top: 4px;
        font-size: 0.85rem;
        color: #666;
      }
      #jd-list {
        list-style: none;
        padding: 0;
        margin: 0 0 24px 0;
      }
      #jd-list li {
        display: block;
        padding: 10px 0;
        border-bottom: 1px solid #eee;
      }
      #jd-list li:last-child {
        border-bottom: none;
      }
      .jd-item-header {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .jd-item-header strong {
        flex: 1;
      }
      .jd-item-header button {
        margin-left: auto;
        flex-shrink: 0;
      }
      details {
        margin-top: 8px;
        font-size: 0.9rem;
      }
      details summary {
        cursor: pointer;
        color: #555;
        user-select: none;
        margin-bottom: 6px;
      }
      .skill-list-editor {
        padding: 6px 0 6px 8px;
        border-left: 2px solid #ddd;
        margin-bottom: 8px;
      }
      .skill-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
      }
      .skill-row .skill-text {
        flex: 1;
        font-size: 0.9rem;
      }
      .skill-row button {
        padding: 2px 6px;
        font-size: 0.85rem;
      }
      .add-skill-form {
        display: flex;
        gap: 6px;
        margin-top: 8px;
        flex-wrap: wrap;
      }
      .add-skill-form .skill-text-input {
        display: inline;
        width: auto;
        flex: 1;
        min-width: 120px;
        margin-bottom: 0;
      }
      .add-skill-form select {
        padding: 6px 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 0.9rem;
      }
      .add-skill-form .add-skill-btn {
        flex-shrink: 0;
      }
      label {
        display: block;
        font-size: 0.9rem;
        font-weight: 500;
        margin-bottom: 4px;
        color: #333;
      }
    </style>
    <script type="module" crossorigin src="/chunks/options-CJRM1ank.js"></script>
    <link rel="modulepreload" crossorigin href="/chunks/browser-BnURzfs5.js">
  </head>
  <body>
    <h1>LinkedIn HHRH Screener Settings</h1>

    <section id="api-key-section">
      <h2>Anthropic API Key</h2>
      <label for="api-key-input">API Key</label>
      <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off">
      <button id="api-key-save-btn">Save &amp; Validate</button>
      <span id="api-key-status"></span>
      <p id="api-key-indicator"></p>
    </section>

    <section id="active-jd-section">
      <h2>Active Job Description</h2>
      <p style="color:#555; font-size:0.9rem; margin-bottom: 12px;">Select which JD to use for candidate evaluations.</p>
      <div id="active-jd-selector"></div>
    </section>

    <section id="jd-section">
      <h2>Job Descriptions</h2>
      <ul id="jd-list"></ul>

      <div id="jd-add-form">
        <label for="jd-title-input">Title</label>
        <input type="text" id="jd-title-input" placeholder="e.g. Senior Backend Engineer">
        <label for="jd-raw-text-input">Job Description Text</label>
        <textarea id="jd-raw-text-input" placeholder="Paste job description text here..." rows="8"></textarea>
        <button id="jd-add-btn">Add Job Description</button>
      </div>
    </section>

  </body>
</html>
